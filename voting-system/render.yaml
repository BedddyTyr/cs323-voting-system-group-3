# render.yaml
# One-click Render Blueprint - deploys all services automatically.
# Commit this file to the ROOT of your GitHub repository.
#
# Services created:
#   1. voting-api       → Web Service  (Flask ingestion API)
#   2. voting-worker    → Background Worker (Redis consumer + DB writer)
#   3. voting-redis     → Redis instance (message queue / Pub/Sub equivalent)
#   4. voting-db        → PostgreSQL instance (persistent vote storage)

services:
  # ── 1. Ingestion API ────────────────────────────────────────────────────────
  - type: web
    name: voting-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: voting-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── 2. Background Worker ─────────────────────────────────────────────────────
  - type: worker
    name: voting-worker
    runtime: python
    rootDir: worker
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: voting-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: voting-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── 3. Redis (Pub/Sub equivalent) ────────────────────────────────────────────
  - type: redis
    name: voting-redis
    plan: free
    maxmemoryPolicy: noeviction

databases:
  # ── 4. PostgreSQL (Firestore equivalent) ─────────────────────────────────────
  - name: voting-db
    plan: free
    databaseName: votes
    user: votes_user
